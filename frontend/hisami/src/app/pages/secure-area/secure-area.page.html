<div class="d-flex flex-column align-items-center justify-content-center py-2 px-3 gap-3 w-100">
  <h1 class="background-primary-color font-32 text-center rounded-10 px-3 py-2">
    Olá {{ employee?.name ?? '' }}
  </h1>
  <div class="d-flex flex-row gap-2 w-100">
    <div class="d-flex flex-column gap-2 w-100">
      <p-panel header="Cadastrar" class="w-100 h-100">
        <div class="d-flex flex-column align-items-center gap-2">
          <p-button
            *ngIf="role?.canEditMenu"
            label="Ingredientes"
            class="w-100"
            styleClass="w-100"
            (click)="showRawDialog()"
          ></p-button>
          <p-button
            *ngIf="role?.canEditMenu"
            label="Produtos"
            class="w-100"
            styleClass="w-100"
            (click)="showProductDialog()"
          ></p-button>
          <p-button
            *ngIf="role?.canSell"
            label="Venda"
            class="w-100"
            styleClass="w-100"
            (click)="showSellDialog()"
          ></p-button>
          <p-button
            *ngIf="role?.canChangeRoles"
            label="Empregado"
            class="w-100"
            styleClass="w-100"
          ></p-button>
        </div>
      </p-panel>
      <div class="inventory-panels">
        <p-panel class="w-100">
          <ng-template pTemplate="header">
            <div class="d-flex justify-content-between align-items-center w-100">
              <span><strong>Inventário de produtos</strong></span>
              <p-button
                icon="pi pi-pencil"
                rounded="true"
                class="edit-button"
                (click)="changeStockProductEditable()"
              ></p-button>
            </div>
          </ng-template>
          <app-stock-product-component
            [isEditable]="isStockProductEditable"
          ></app-stock-product-component>
        </p-panel>
        <p-panel class="w-100">
          <ng-template pTemplate="header">
            <div class="d-flex justify-content-between align-items-center w-100">
              <span><strong>Inventário de ingredientes</strong></span>
              <p-button
                icon="pi pi-pencil"
                rounded="true"
                class="edit-button"
                (click)="changeStockRawEditable()"
              ></p-button>
            </div>
          </ng-template>
          <app-stock-raw-component [isEditable]="isStockRawEditable"></app-stock-raw-component
        ></p-panel>
      </div>
    </div>
    <p-panel header="Finanças do dia" class="w-100"> </p-panel>
  </div>
</div>

<app-raw-component
  *ngIf="isDialogRawVisible"
  [visible]="isDialogRawVisible"
  (onClose)="closeRawDialog()"
></app-raw-component>

<app-product-component
  *ngIf="isDialogProductVisible"
  [visible]="isDialogProductVisible"
  (onClose)="closeProductDialog()"
>
</app-product-component>

<app-sell-component
  *ngIf="isDialogSellVisible"
  [visible]="isDialogSellVisible"
  (onClose)="closeSellDialog()"
></app-sell-component>
