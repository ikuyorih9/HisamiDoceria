<div *ngFor="let product of products" class="d-flex flex-column">
  <div class="d-flex justify-content-between align-items-center py-1">
    <span>{{ product.name }}</span>
    <p-inputNumber
      styleClass="qty"
      [min]="0"
      [readonly]="!isEditable"
      [(ngModel)]="product.stockQuantity"
      [showButtons]="isEditable"
      (ngModelChange)="update(product)"
    ></p-inputNumber>
  </div>
</div>
